{{define "layout"}}
<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaldfjornia Climbing Works</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>

<body hx-boost="true">
  <!-- Navigation Header -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <a href="/"><img src="/assets/logo.png" alt="Kaldfjornia Logo" class="nav-logo"></a>
      </div>
      <nav class="nav-links">
        <a href="/#about">Om</a>
        <a href="/#products">Utstyr</a>
        <a href="/#contact">Kontakt</a>
      </nav>
    </div>
  </header>

  <main id="main-content">
    {{template "content" .}}
  </main>

  <!-- Footer Section -->
  <footer id="contact" class="footer">
    <div class="container footer-content">
      <div class="footer-brand">
        <img src="/assets/logo.png" alt="Kaldfjornia Logo" class="footer-logo">
        <p>Kaldfjornia Climbing Works<br>Kaldfjord, Tromsø, Norge</p>
      </div>
      <div class="footer-links">
        <a href="mailto:hallo@kaldfjornia.no">hallo@kaldfjornia.no</a>
        <div class="socials">
          <a href="#">Instagram</a><br>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Kaldfjornia Climbing Works. Bygget med plank, pils og svette.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/app.js"></script>
</body>

</html>
{{end}}
